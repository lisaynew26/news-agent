name: Daily News Agent

on:
  schedule:
    - cron: '0 0 * * *'  # 每天 UTC 0 点（北京时间早8点）
  workflow_dispatch:      # 允许手动触发

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Checkout
      uses: actions/checkout@v4     # 升级至 v4

    - name: Setup Python
      uses: actions/setup-python@v5 # 升级至 v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: pip install feedparser requests

    - name: Run news agent
      env:
        DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      run: python news_agent.py

    - name: Deploy to Pages
      uses: peaceiris/actions-gh-pages@v4  # 升级至 v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./
        publish_branch: gh-pages
        force_orphan: true
